[platformio]
default_envs = stm32f411

[env:flight]
platform = ststm32
board = genericSTM32F411CE
framework = stm32cube
build_flags =
    -DSTM32F411xE
    -UUSE_HAL_DRIVER
    -mcpu=cortex-m4
    -mthumb
    -mfpu=fpv4-sp-d16
    -mfloat-abi=softfp
    -Og
    -g3
    -std=gnu11
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -I$PROJECT_DIR/hal
    -I$PROJECT_DIR/drivers
    -I$PROJECT_DIR/algorithm
    -I$PROJECT_DIR/comm
    -I$PROJECT_DIR/main
; build_src_filter paths are relative to src_dir (default: src/).
; Use ../ to reach sibling directories at project root level.
build_src_filter =
    -<*>
    +<../hal/*.c>
    +<../drivers/*.c>
    +<../algorithm/ahrs.c>
    +<../algorithm/pid_controller.c>
    +<../algorithm/flight_controller.c>
    +<../algorithm/sensor_calibration.c>
    +<../comm/protocol.c>
    +<../comm/wifi_command.c>
    +<../main/flight_main.c>
    +<../main/flight_entry.c>
upload_protocol = stlink
debug_tool = stlink
board_build.f_cpu = 100000000L
board_build.variants_dir = variants
board_build.variant = generic
monitor_speed = 460800

[env:stm32f411]
platform = ststm32
board = genericSTM32F411CE
framework = stm32cube
build_flags =
    -DSTM32F411xE
    -DUSE_HAL_DRIVER
    -mcpu=cortex-m4
    -mthumb
    -mfpu=fpv4-sp-d16
    -mfloat-abi=softfp
    -Og
    -g3
    -Wall
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
build_src_flags =
    -std=gnu11
build_type = debug
board_build.f_cpu = 100000000L
; Only compile main.c from src/, exclude other source directories
build_src_filter = +<*.c> +<*.cpp> -<main/> -<drivers/> -<hal/> -<algorithm/> -<comm/> -<flight/> -<protocol/> -<sensor_test_main.c>
upload_protocol = stlink
debug_tool = stlink
board_build.variants_dir = variants
board_build.variant = generic
monitor_speed = 460800
monitor_port = /dev/tty.usbmodem*
